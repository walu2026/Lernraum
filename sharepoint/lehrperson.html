<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABU Lernportal – Lehrperson</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --t1:#C0392B;--t2:#E67E22;--t3:#27AE60;--t4:#2980B9;--t5:#F39C12;--t6:#8E44AD;--t7:#6C3483;
    --g9:#111827;--g7:#374151;--g5:#6B7280;--g3:#D1D5DB;--g1:#F3F4F6;
    --phase-e:#2980B9;--phase-th:#27AE60;--phase-ue:#E67E22;--phase-a:#8E44AD;--phase-vid:#1a5276;--phase-ppt:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#F0F2F5;color:var(--g7);}
  .wrap{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 5rem;}

  .p1-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(30px,5vw,46px);font-weight:800;text-transform:uppercase;color:var(--g9);letter-spacing:-1px;line-height:1;margin-bottom:4px;}
  .p1-sub{font-size:13px;color:var(--g5);margin-bottom:1.5rem;}
  .lp-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:#EDE9FE;color:#5B21B6;padding:4px 10px;border-radius:20px;margin-bottom:0.75rem;}

  .rainbow{display:flex;height:3px;border-radius:2px;overflow:hidden;margin-bottom:2rem;}
  .rainbow span{flex:1;}

  /* Filter bar */
  .filter-bar{background:white;border-radius:14px;padding:16px 20px;margin-bottom:1.75rem;display:flex;flex-wrap:wrap;gap:12px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  .filter-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--g5);margin-right:4px;}
  .filter-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .phase-btn{border:1.5px solid var(--g3);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;background:white;color:var(--g5);transition:all .15s;letter-spacing:0.3px;}
  .phase-btn:hover{border-color:var(--g7);color:var(--g9);}
  .phase-btn.active{color:white;border-color:transparent;}
  .phase-btn[data-phase="E"].active{background:var(--phase-e);}
  .phase-btn[data-phase="TH"].active{background:var(--phase-th);}
  .phase-btn[data-phase="UE"].active{background:var(--phase-ue);}
  .phase-btn[data-phase="A"].active{background:var(--phase-a);}
  .phase-btn[data-phase="VID"].active{background:var(--phase-vid);}
  .phase-btn[data-phase="PPT"].active{background:var(--phase-ppt);}
  .phase-btn[data-phase="ALL"].active{background:var(--g9);}
  .divider{width:1px;height:24px;background:var(--g3);}
  select{font-size:12px;border:1.5px solid var(--g3);border-radius:8px;padding:5px 10px;background:white;color:var(--g7);cursor:pointer;}

  /* Stats bar */
  .stats-bar{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .stat-card{background:white;border-radius:10px;padding:10px 16px;font-size:12px;color:var(--g5);border:1px solid var(--g3);}
  .stat-card strong{font-size:18px;font-weight:700;color:var(--g9);display:block;line-height:1.2;}

  /* Theme blocks */
  .theme-block{margin-bottom:1.25rem;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .theme-title-bar{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--tbg,#f9f9f9);cursor:pointer;user-select:none;}
  .theme-stripe{width:5px;height:32px;border-radius:3px;flex-shrink:0;background:var(--tc);}
  .theme-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;color:var(--tc);}
  .theme-num{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--g5);margin-left:auto;}
  .theme-toggle{font-size:18px;color:var(--g5);margin-left:8px;transition:transform .2s;}
  .theme-toggle.open{transform:rotate(180deg);}
  .theme-body{background:white;padding:0;}

  /* LS rows */
  .ls-row{border-top:1px solid var(--g1);}
  .ls-header{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;}
  .ls-code{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--tc);min-width:42px;opacity:0.4;}
  .ls-name{font-size:14px;font-weight:600;color:var(--g9);flex:1;}
  .ls-count{font-size:11px;color:var(--g5);background:var(--g1);padding:3px 8px;border-radius:10px;}
  .ls-chevron{font-size:14px;color:var(--g3);transition:transform .2s;}
  .ls-chevron.open{transform:rotate(90deg);}

  /* LJ table */
  .lj-table{width:100%;border-collapse:collapse;}
  .lj-table thead tr{background:var(--g1);}
  .lj-table th{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--g5);padding:8px 16px;text-align:left;border-bottom:1px solid var(--g3);}
  .lj-table th.phase-col{text-align:center;}
  .lj-table td{padding:10px 16px;border-bottom:1px solid var(--g1);vertical-align:middle;}
  .lj-table tr:last-child td{border-bottom:none;}
  .lj-table tr:hover td{background:#FAFAFA;}

  .lj-num{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--tc);opacity:0.5;}
  .lj-name{font-size:13px;font-weight:600;color:var(--g9);}
  .lj-sub{font-size:11px;color:var(--g5);margin-top:1px;}

  /* Phase cells */
  .phase-cell{text-align:center;}
  .phase-chips{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:12px;text-decoration:none;transition:opacity .15s;white-space:nowrap;}
  .chip:hover{opacity:0.8;}
  .chip-E{background:#DBEAFE;color:#1e40af;}
  .chip-TH{background:#DCFCE7;color:#166534;}
  .chip-UE{background:#FEF3C7;color:#92400e;}
  .chip-A{background:#F3E8FF;color:#6b21a8;}
  .chip-VID{background:#E0F2FE;color:#0c4a6e;}
  .chip-PPT{background:#FEE2E2;color:#991b1b;}
  .chip-missing{background:var(--g1);color:var(--g3);cursor:default;border:1.5px dashed var(--g3);}
  .chip-missing:hover{opacity:1;}

  .no-results{text-align:center;padding:3rem;color:var(--g5);font-size:14px;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--g5);text-decoration:none;margin-bottom:1.5rem;transition:color .15s;}
  .back-btn:hover{color:var(--g9);}
  .hidden{display:none!important;}

  /* Aktualität */
  .akt-zone{background:#FAFAFA;border-top:1.5px dashed var(--g3);padding:12px 20px;}
  .akt-header{display:flex;align-items:center;gap:8px;margin-bottom:0;}
  .akt-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g5);}
  .akt-add-btn{font-size:11px;font-weight:600;border:0.5px dashed var(--g3);border-radius:8px;padding:4px 10px;background:none;cursor:pointer;color:var(--g5);transition:all .15s;margin-left:auto;}
  .akt-add-btn:hover{background:white;border-color:var(--g7);color:var(--g9);}
  .akt-form{background:white;border:1px solid var(--g3);border-radius:10px;padding:12px;margin-top:8px;display:none;flex-direction:column;gap:8px;}
  .akt-form.open{display:flex;}
  .akt-form input,.akt-form select{font-size:12px;border:1px solid var(--g3);border-radius:6px;padding:6px 10px;color:var(--g9);width:100%;}
  .akt-form input:focus{outline:none;border-color:var(--g7);}
  .akt-form-row{display:flex;gap:8px;}
  .akt-save-btn{font-size:12px;font-weight:600;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;color:white;flex-shrink:0;}
  .akt-cancel-btn{font-size:12px;border:1px solid var(--g3);border-radius:8px;padding:7px 12px;cursor:pointer;background:none;color:var(--g5);}
  .akt-entries{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
  .akt-entry{display:flex;align-items:center;gap:8px;background:white;border:0.5px solid var(--g3);border-radius:8px;padding:7px 10px;}
  .akt-entry-date{font-size:10px;color:var(--g5);white-space:nowrap;flex-shrink:0;}
  .akt-entry-phase{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;flex-shrink:0;}
  .akt-entry-title{font-size:12px;font-weight:600;color:var(--g9);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .akt-entry-link{font-size:11px;color:#2980B9;text-decoration:none;flex-shrink:0;}
  .akt-entry-link:hover{text-decoration:underline;}
  .akt-entry-del{background:none;border:none;cursor:pointer;color:var(--g3);font-size:13px;flex-shrink:0;padding:2px;}
  .akt-entry-del:hover{color:#e74c3c;}
  .akt-archive-toggle{font-size:11px;color:var(--g5);background:none;border:none;cursor:pointer;padding:6px 0 2px;display:flex;align-items:center;gap:4px;}
  .akt-archive-toggle:hover{color:var(--g9);}
  .akt-archive{display:none;margin-top:4px;border-top:1px solid var(--g3);padding-top:6px;}
  .akt-archive.open{display:block;}
  .akt-block{padding:4px 0;}
  .akt-cols{display:grid;grid-template-columns:1fr auto 1fr;gap:0;padding:6px 0 4px;}
  .akt-col{padding:0 4px;}
  .akt-col-divider{width:1px;background:var(--g3);margin:4px 8px;}
  @media(max-width:700px){.akt-cols{grid-template-columns:1fr;}.akt-col-divider{width:100%;height:1px;margin:6px 0;}}
  .akt-block-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .akt-block-icon{font-size:13px;}
  .akt-block-label{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--g7);}
</style>
</head>
<body>
<div class="wrap">
  <a class="back-btn" href="index.html">← Zurück zum Portal</a>
  <div class="lp-badge">&#128274; Lehrperson</div>
  <div class="p1-title">Material&shy;übersicht</div>
  <p class="p1-sub">ABU Lernportal · Alle Lernjobs nach AVIVA-Phasen</p>

  <div class="rainbow">
    <span style="background:#C0392B"></span><span style="background:#E67E22"></span>
    <span style="background:#27AE60"></span><span style="background:#2980B9"></span>
    <span style="background:#F39C12"></span><span style="background:#8E44AD"></span>
    <span style="background:#6C3483"></span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-label">Phase</span>
    <div class="filter-group">
      <button class="phase-btn active" data-phase="ALL" onclick="setPhase('ALL')">Alle</button>
      <button class="phase-btn" data-phase="E" onclick="setPhase('E')">[E] Einstieg</button>
      <button class="phase-btn" data-phase="TH" onclick="setPhase('TH')">[TH] Theorie</button>
      <button class="phase-btn" data-phase="UE" onclick="setPhase('UE')">[UE] Übung</button>
      <button class="phase-btn" data-phase="A" onclick="setPhase('A')">[A] Abschluss</button>
      <button class="phase-btn" data-phase="VID" onclick="setPhase('VID')">VID Video</button>
      <button class="phase-btn" data-phase="PPT" onclick="setPhase('PPT')">PPT</button>
    </div>
    <div class="divider"></div>
    <span class="filter-label">Thema</span>
    <select id="themaFilter" onchange="filterThema()">
      <option value="ALL">Alle Themen</option>
      <option value="1">Thema 1 · Mein Lehrbeginn</option>
      <option value="2">Thema 2 · Mein Geld</option>
      <option value="3">Thema 3 · Meine Gesundheit</option>
      <option value="4">Thema 4 · Unsere Schweiz</option>
      <option value="5">Thema 5 · Unser Zusammenleben</option>
      <option value="6">Thema 6 · Unsere Welt</option>
      <option value="7">Thema 7 · Meine Zukunft</option>
    </select>
    <div class="divider"></div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g5);cursor:pointer;">
      <input type="checkbox" id="missingOnly" onchange="renderAll()" style="cursor:pointer;">
      Nur fehlende anzeigen
    </label>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Content -->
  <div id="content"></div>
</div>

<script>
const PHASES = ['E','TH','UE','A','VID','PPT'];
const PHASE_LABEL = {E:'Einstieg',TH:'Theorie',UE:'Übung',A:'Abschluss',VID:'Video',PPT:'Präsentation'};

const THEMES = [
  {id:1,name:'Mein Lehrbeginn',tc:'#C0392B',tbg:'#FDDBD9',ls:[
    {id:'101',name:'Lehrvertrag & Rechte',files:{PPT:{label:'110_PPT',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},TH:{label:'110_[TH]_Theorie',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},UE:{label:'110_[UE]_Aufgaben',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},A:{label:'110_[A]_Selbstcheck',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'}}},
    {id:'102',name:'Rechtsgrundlagen',files:{PPT:{label:'120_PPT',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},TH:{label:'120_[TH]_Theorie',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},UE:{label:'120_[UE]_Aufgaben',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},VID:{label:'120_VID_[E]_Einstieg',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'}}},
    {id:'103',name:'Kommunikation & Konflikte',files:{PPT:{label:'130_PPT',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},TH:{label:'130_[TH]_Modelle',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'}}},
  ]},
  {id:2,name:'Mein Geld',tc:'#E67E22',tbg:'#FCE9D4',ls:[
    {id:'201',name:'Lohn & Budget',files:{PPT:{label:'210_PPT',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},TH:{label:'210_[TH]_Lohnausweis',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},UE:{label:'210_[UE]_Budgetplan',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},VID:{label:'210_VID_[E]_Budget',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},A:{label:'210_[A]_Quiz',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'}}},
    {id:'202',name:'Konsum & Werbung',files:{E:{label:'220_[E]_Einstieg',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},PPT:{label:'220_PPT',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},UE:{label:'220_[UE]_Analyse',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'}}},
    {id:'203',name:'Kaufvertrag',files:{PPT:{label:'230_PPT',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},TH:{label:'230_[TH]_Theorie',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},UE:{label:'230_[UE]_Fallbeispiele',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},A:{label:'230_[A]_Selbstcheck',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'}}},
    {id:'204',name:'Investition & Finanzierung',files:{PPT:{label:'240_PPT',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'},TH:{label:'240_[TH]_Finanzierung',url:'https://bldsg.sharepoint.com/:f:/t/ABULernportal'}}},
  ]},
  {id:3,name:'Meine Gesundheit',tc:'#27AE60',tbg:'#D4F7E2',ls:[
    {id:'301',name:'Gesundheitsfaktoren',files:{PPT:{label:'310_PPT',url:'#'},TH:{label:'310_[TH]_Modelle',url:'#'},UE:{label:'310_[UE]_Aufgaben',url:'#'}}},
    {id:'302',name:'Prävention',files:{E:{label:'320_[E]_Einstieg',url:'#'},PPT:{label:'320_PPT',url:'#'},UE:{label:'320_[UE]_Aufgaben',url:'#'}}},
    {id:'303',name:'Krankenkasse & Versicherung',files:{PPT:{label:'330_PPT',url:'#'},TH:{label:'330_[TH]_Theorie',url:'#'},UE:{label:'330_[UE]_Fallbeispiele',url:'#'},A:{label:'330_[A]_Quiz',url:'#'}}},
    {id:'304',name:'Stress, Sucht & Resilienz',files:{E:{label:'340_[E]_Einstieg',url:'#'},PPT:{label:'340_PPT',url:'#'},VID:{label:'340_VID_[TH]_Stress',url:'#'}}},
    {id:'305',name:'Gewalt & Zivilcourage',files:{PPT:{label:'350_PPT',url:'#'},UE:{label:'350_[UE]_Szenarien',url:'#'}}},
  ]},
  {id:4,name:'Unsere Schweiz',tc:'#2980B9',tbg:'#D4E9F9',ls:[
    {id:'401',name:'Demokratie & Politik',files:{PPT:{label:'410_PPT',url:'#'},TH:{label:'410_[TH]_System',url:'#'},UE:{label:'410_[UE]_Aufgaben',url:'#'},A:{label:'410_[A]_Quiz',url:'#'}}},
    {id:'402',name:'Meinungsbildung & Medien',files:{E:{label:'420_[E]_Einstieg',url:'#'},PPT:{label:'420_PPT',url:'#'},VID:{label:'420_VID_[E]_Medien',url:'#'}}},
    {id:'403',name:'Vielseitigkeit der Schweiz',files:{PPT:{label:'430_PPT',url:'#'},TH:{label:'430_[TH]_Regionen',url:'#'},UE:{label:'430_[UE]_Aufgaben',url:'#'}}},
  ]},
  {id:5,name:'Unser Zusammenleben',tc:'#F39C12',tbg:'#FCF0CD',ls:[
    {id:'501',name:'Beziehungen',files:{E:{label:'510_[E]_Einstieg',url:'#'},PPT:{label:'510_PPT',url:'#'},UE:{label:'510_[UE]_Aufgaben',url:'#'}}},
    {id:'502',name:'Ausziehen & Mietrecht',files:{PPT:{label:'520_PPT',url:'#'},TH:{label:'520_[TH]_Mietrecht',url:'#'},UE:{label:'520_[UE]_Fallbeispiele',url:'#'},A:{label:'520_[A]_Selbstcheck',url:'#'}}},
    {id:'503',name:'Lebensmodelle',files:{PPT:{label:'530_PPT',url:'#'},TH:{label:'530_[TH]_Modelle',url:'#'}}},
    {id:'504',name:'Multikulturell',files:{E:{label:'540_[E]_Einstieg',url:'#'},PPT:{label:'540_PPT',url:'#'},VID:{label:'540_VID_[TH]_Migration',url:'#'},UE:{label:'540_[UE]_Aufgaben',url:'#'}}},
    {id:'505',name:'Gesellschaft',files:{PPT:{label:'550_PPT',url:'#'},TH:{label:'550_[TH]_Normen',url:'#'},UE:{label:'550_[UE]_Fallbeispiele',url:'#'}}},
  ]},
  {id:6,name:'Unsere Welt',tc:'#8E44AD',tbg:'#F5EEF8',ls:[
    {id:'601',name:'Weltgeschehen',files:{E:{label:'610_[E]_Einstieg',url:'#'},PPT:{label:'610_PPT',url:'#'},VID:{label:'610_VID_[E]_News',url:'#'}}},
    {id:'602',name:'Ökologie',files:{PPT:{label:'620_PPT',url:'#'},TH:{label:'620_[TH]_Klima',url:'#'},UE:{label:'620_[UE]_Aufgaben',url:'#'},A:{label:'620_[A]_Selbstcheck',url:'#'}}},
    {id:'603',name:'Vernetzung',files:{PPT:{label:'630_PPT',url:'#'},TH:{label:'630_[TH]_Global',url:'#'},UE:{label:'630_[UE]_Aufgaben',url:'#'}}},
    {id:'604',name:'Migration',files:{E:{label:'640_[E]_Einstieg',url:'#'},PPT:{label:'640_PPT',url:'#'},VID:{label:'640_VID_[TH]_Migration',url:'#'},UE:{label:'640_[UE]_Aufgaben',url:'#'}}},
  ]},
  {id:7,name:'Meine Zukunft',tc:'#6C3483',tbg:'#EBD5F7',ls:[
    {id:'701',name:'Arbeitsmarkt',files:{PPT:{label:'710_PPT',url:'#'},TH:{label:'710_[TH]_Arbeitsmarkt',url:'#'},UE:{label:'710_[UE]_Aufgaben',url:'#'},A:{label:'710_[A]_Quiz',url:'#'}}},
    {id:'702',name:'Bewerbung',files:{PPT:{label:'720_PPT',url:'#'},TH:{label:'720_[TH]_Bewerbung',url:'#'},UE:{label:'720_[UE]_Lebenslauf',url:'#'},A:{label:'720_[A]_Selbstcheck',url:'#'}}},
    {id:'703',name:'Steuern & Vorsorge',files:{PPT:{label:'730_PPT',url:'#'},TH:{label:'730_[TH]_Steuern',url:'#'},UE:{label:'730_[UE]_Steuererklarung',url:'#'},VID:{label:'730_VID_[TH]_Vorsorge',url:'#'},A:{label:'730_[A]_Quiz',url:'#'}}},
    {id:'704',name:'Zukunftsplanung',files:{E:{label:'740_[E]_Einstieg',url:'#'},PPT:{label:'740_PPT',url:'#'},UE:{label:'740_[UE]_Aufgaben',url:'#'}}},
  ]},
];

let activePhase = 'ALL';
let activeThema = 'ALL';

function setPhase(p) {
  activePhase = p;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.dataset.phase === p));
  renderAll();
  renderAllAkt();
}

function filterThema() {
  activeThema = document.getElementById('themaFilter').value;
  renderAll();
  renderAllAkt();
}

function chipHtml(phase, file, tc) {
  if (!file) {
    return `<span class="chip chip-missing" title="Noch kein Material für ${PHASE_LABEL[phase]}">[${phase === 'PPT' ? 'PPT' : phase}] fehlt</span>`;
  }
  const url = file.url && file.url !== '#' ? file.url : null;
  if (url) {
    return `<a class="chip chip-${phase}" href="${url}" target="_blank" title="${file.label}">[${phase === 'PPT' ? 'PPT' : phase}]</a>`;
  }
  return `<span class="chip chip-${phase}" title="${file.label}">[${phase === 'PPT' ? 'PPT' : phase}]</span>`;
}

function renderAll() {
  const missingOnly = document.getElementById('missingOnly').checked;
  const content = document.getElementById('content');
  let totalLS = 0, presentCount = 0, missingCount = 0;
  let html = '';

  THEMES.forEach(theme => {
    if (activeThema !== 'ALL' && String(theme.id) !== activeThema) return;
    let themeHtml = '';

    theme.ls.forEach(ls => {
      totalLS++;
      const phasesToShow = activePhase === 'ALL' ? PHASES : [activePhase];
      let chips = '';
      let hasMatch = false;
      let hasMissing = false;

      phasesToShow.forEach(p => {
        const file = ls.files[p];
        if (file) { presentCount++; hasMatch = true; }
        else hasMissing = true;
        chips += chipHtml(p, file, theme.tc);
      });

      if (missingOnly && !hasMissing) return;
      if (activePhase !== 'ALL' && !hasMatch && !missingOnly) return;

      themeHtml += `<div class="ls-row">
        <div style="display:flex;align-items:center;gap:14px;padding:14px 20px;">
          <span class="ls-code" style="color:${theme.tc};opacity:1;font-size:18px;min-width:36px">${ls.id}</span>
          <span class="ls-name">${ls.name}</span>
          <div class="phase-chips" style="margin-left:auto">${chips}</div>
        </div>
      </div>`;
    });

    if (!themeHtml) return;

    // Aktualität-Zone anhängen
    themeHtml += renderAktZone(theme);

    html += `<div class="theme-block" style="--tc:${theme.tc};--tbg:${theme.tbg}" id="theme-${theme.id}">
      <div class="theme-title-bar" onclick="toggleTheme(${theme.id})">
        <div class="theme-stripe" style="background:${theme.tc}"></div>
        <div class="theme-title" style="color:${theme.tc}">${theme.name}</div>
        <div class="theme-num">Thema ${theme.id}</div>
        <span class="theme-toggle open" id="tog-${theme.id}">▾</span>
      </div>
      <div class="theme-body" id="tbody-${theme.id}">${themeHtml}</div>
    </div>`;
  });

  content.innerHTML = html || `<div class="no-results">Kein Material gefunden für diese Filterauswahl.</div>`;

  const missingChips = document.querySelectorAll('.chip-missing');
  missingCount = missingChips.length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><strong>${totalLS}</strong>Lebenssituationen</div>
    <div class="stat-card"><strong>${presentCount}</strong>Materialien vorhanden</div>
    <div class="stat-card" style="border-color:#fca5a5"><strong style="color:#dc2626">${missingCount}</strong>Phasen fehlen</div>
  `;
}

function toggleTheme(id) {
  const body = document.getElementById('tbody-'+id);
  const tog = document.getElementById('tog-'+id);
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  tog.classList.toggle('open', hidden);
}

renderAll();

// ═══════════════════════════════════════════════════════════════════
// AKTUALITÄT — zwei getrennte Quellen
//
// 1. 🤖 KI-Beiträge  → aktualitaeten.json (GitHub Actions, täglich/wöchentlich)
//    JSON-Struktur pro Thema:
//    { "2": [
//        { "id": "art-001",
//          "date": "30.05.25",
//          "title": "SNB senkt Leitzins",
//          "source": "SRF",
//          "url": "https://...",
//          "varianten": [
//            { "phase": "E",   "text": "Frage: Was bedeutet...?",   "pptUrl": "#" },
//            { "phase": "TH",  "text": "Hintergrund: Der Leitzins...", "url": "#" },
//            { "phase": "UE",  "text": "Aufgabe: Berechne...",        "url": "#" }
//          ]
//        }, ...
//      ]
//    }
//
// 2. 📂 LP-Beiträge → SharePoint _AKTUALITAETEN/ (via Graph API)
//    Dateiname: 200_AKT_[E]_SNB_Zinsen.pdf
// ═══════════════════════════════════════════════════════════════════

const PHASE_COLORS = {
  E:  {bg:'#DBEAFE', col:'#1e40af'},
  TH: {bg:'#DCFCE7', col:'#166534'},
  UE: {bg:'#FEF3C7', col:'#92400e'},
  A:  {bg:'#F3E8FF', col:'#6b21a8'},
  VID:{bg:'#E0F2FE', col:'#0c4a6e'},
  PPT:{bg:'#FEE2E2', col:'#991b1b'},
};
const MAX_RECENT = 3;

// ── Daten laden ─────────────────────────────────────────────────────

async function loadKiEntries(themeId) {
  try {
    const r = await fetch('aktualitaeten.json?t=' + Date.now());
    if (!r.ok) return [];
    const data = await r.json();
    return data[String(themeId)] || [];
  } catch(e) {
    // Noch nicht vorhanden — Demo-Daten für Vorschau
    if (String(themeId) === '2') return DEMO_KI_ENTRIES;
    return [];
  }
}

// Demo-Daten zeigen wie es aussehen wird
function relDate(daysAgo) {
  const d = new Date(); d.setDate(d.getDate() - daysAgo);
  return d.toLocaleDateString('de-CH', {day:'2-digit', month:'2-digit'});
}
const DEMO_KI_ENTRIES = [
  { id:'demo-1', date:relDate(1), title:'SNB senkt Leitzins auf 0.5%', source:'SRF',
    varianten:[
      {phase:'E',  text:'Einstiegsfrage: Was bedeutet ein tieferer Leitzins für dein Sparkonto?'},
      {phase:'TH', text:'Hintergrund: Die SNB steuert mit dem Leitzins die Inflation...'},
      {phase:'UE', text:'Aufgabe: Berechne, wie sich dein Sparguthaben bei 0.5% Zins entwickelt.'},
    ]},
  { id:'demo-2', date:relDate(3), title:'Inflation sinkt auf 1.2%', source:'NZZ',
    varianten:[
      {phase:'E',  text:'Was kaufst du dir, wenn alles billiger wird?'},
      {phase:'TH', text:'Inflation misst die Teuerung eines Warenkorbs über Zeit...'},
    ]},
];

async function loadSpEntries(themeId) {
  try {
    // TODO: Azure App-Registrierung → Sites.Read.All
    // const r = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drive/root:/_AKTUALITAETEN_T${themeId}:/children`,
    //   { headers: { Authorization: 'Bearer ' + await getToken() } });
    // const data = await r.json();
    // return parseSpFiles(data.value);
    return [];
  } catch(e) { return []; }
}

function parseSpFileName(name) {
  const m = name.match(/^(\d+)_AKT_\[?(\w+)\]?_(.+)\.\w+$/);
  if (!m) return null;
  return { lsId:m[1], phase:m[2].toUpperCase(), title:m[3].replace(/_/g,' ') };
}

// ── Render ──────────────────────────────────────────────────────────

// Rendert einen Artikel mit all seinen Varianten als Chips
function renderKiArticle(article) {
  // Filter: zeige nur Varianten die zum aktiven Phase-Filter passen
  const variantsToShow = article.varianten.filter(v =>
    activePhase === 'ALL' || v.phase === activePhase
  );
  if (variantsToShow.length === 0) return ''; // nicht anzeigen wenn gefiltert

  const chips = variantsToShow.map(v => {
    const pc = PHASE_COLORS[v.phase] || {bg:'#F3F4F6',col:'#6B7280'};
    const url = v.pptUrl || v.url || null;
    return url
      ? `<a class="chip chip-${v.phase}" href="${url}" target="_blank" title="${v.text}">[${v.phase}]</a>`
      : `<span class="chip chip-${v.phase}" title="${v.text}">[${v.phase}]</span>`;
  }).join('');

  const isDemo = article.id.startsWith('demo');
  return `<div class="akt-entry${isDemo?' akt-entry-demo':''}">
    <span class="akt-entry-date">${article.date}</span>
    <span class="akt-entry-title" title="${article.title}">${article.title}</span>
    <span style="font-size:10px;color:var(--g5);flex-shrink:0">${article.source}</span>
    ${article.url ? `<a class="akt-entry-link" href="${article.url}" target="_blank">↗</a>` : ''}
    <div style="display:flex;gap:3px;flex-shrink:0">${chips}</div>
    ${isDemo ? `<span style="font-size:9px;color:var(--g3);flex-shrink:0">Demo</span>` : ''}
  </div>`;
}

function renderSpEntry(e) {
  const pc = PHASE_COLORS[e.phase] || {bg:'#F3F4F6',col:'#6B7280'};
  if (activePhase !== 'ALL' && e.phase !== activePhase) return '';
  return `<div class="akt-entry">
    <span class="akt-entry-date">${e.date||''}</span>
    <span class="akt-entry-phase" style="background:${pc.bg};color:${pc.col}">[${e.phase}]</span>
    <span class="akt-entry-title">${e.title}</span>
    ${e.url ? `<a class="akt-entry-link" href="${e.url}" target="_blank">↗</a>` : ''}
  </div>`;
}

// Skeleton (synchron, sofort)
function renderAktZone(theme) {
  return `<div class="akt-zone" id="akt-${theme.id}">
    <div class="akt-header">
      <span style="font-size:15px">🗞</span>
      <span class="akt-title">Aktualität</span>
      <span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:${theme.tc}22;color:${theme.tc};padding:2px 8px;border-radius:10px;">${theme.name}</span>
    </div>
    <div class="akt-cols">
      <div class="akt-col">
        <div class="akt-block-header">
          <span class="akt-block-icon">🤖</span>
          <span class="akt-block-label">KI-Beiträge</span>
          <span id="akt-ki-status-${theme.id}" style="font-size:10px;color:var(--g3)">lädt…</span>
        </div>
        <div class="akt-entries" id="akt-ki-entries-${theme.id}"></div>
        <div id="akt-ki-archive-wrap-${theme.id}"></div>
      </div>
      <div class="akt-col-divider"></div>
      <div class="akt-col">
        <div class="akt-block-header">
          <span class="akt-block-icon">📂</span>
          <span class="akt-block-label">LP-Beiträge</span>
          <span id="akt-sp-status-${theme.id}" style="font-size:10px;color:var(--g3)">lädt…</span>
        </div>
        <div class="akt-entries" id="akt-sp-entries-${theme.id}"></div>
        <div id="akt-sp-archive-wrap-${theme.id}"></div>
      </div>
    </div>
  </div>`;
}

// Daten einfüllen (async, nach Render)
async function fillAktZone(theme) {
  const [kiAll, spAll] = await Promise.all([
    loadKiEntries(theme.id),
    loadSpEntries(theme.id)
  ]);

  // ── KI ──
  const kiRecent  = kiAll.slice(0, MAX_RECENT);
  const kiArchive = kiAll.slice(MAX_RECENT);

  const kiStatusEl  = document.getElementById(`akt-ki-status-${theme.id}`);
  const kiEntriesEl = document.getElementById(`akt-ki-entries-${theme.id}`);
  const kiArcWrap   = document.getElementById(`akt-ki-archive-wrap-${theme.id}`);

  if (kiStatusEl) {
    if (kiAll.length) {
      const isDemo = kiAll[0].id?.startsWith('demo');
      kiStatusEl.innerHTML = isDemo
        ? `<span style="color:var(--g3);font-style:italic">Demo-Vorschau · wird durch GitHub Actions befüllt</span>`
        : `<span style="color:var(--g5)">aktualisiert · ${kiAll[0].date}</span>`;
    } else {
      kiStatusEl.innerHTML = `<span style="color:var(--g3);font-style:italic">Noch nicht eingerichtet</span>`;
    }
  }

  if (kiEntriesEl) {
    const rows = kiRecent.map(a => renderKiArticle(a)).filter(Boolean).join('');
    kiEntriesEl.innerHTML = rows ||
      `<div style="font-size:11px;color:var(--g3);padding:5px 0;font-style:italic">Wird automatisch befüllt (GitHub Actions)</div>`;
  }

  if (kiArcWrap && kiArchive.length) {
    const arcRows = kiArchive.map(a => renderKiArticle(a)).filter(Boolean).join('');
    if (arcRows) kiArcWrap.innerHTML =
      `<button class="akt-archive-toggle" onclick="toggleArchive('ki-${theme.id}')">▸ Archiv (${kiArchive.length} ältere Artikel)</button>
       <div class="akt-archive" id="akt-archive-ki-${theme.id}">${arcRows}</div>`;
  }

  // ── SharePoint ──
  const spRecent  = spAll.slice(0, MAX_RECENT);
  const spArchive = spAll.slice(MAX_RECENT);

  const spStatusEl  = document.getElementById(`akt-sp-status-${theme.id}`);
  const spEntriesEl = document.getElementById(`akt-sp-entries-${theme.id}`);
  const spArcWrap   = document.getElementById(`akt-sp-archive-wrap-${theme.id}`);

  if (spStatusEl) spStatusEl.innerHTML = spAll.length
    ? `<span style="color:var(--g5)">${spAll.length} Datei(en)</span>`
    : `<span style="color:var(--g3);font-style:italic">Noch nicht eingerichtet</span>`;

  if (spEntriesEl) {
    const rows = spRecent.map(e => renderSpEntry(e)).filter(Boolean).join('');
    spEntriesEl.innerHTML = rows ||
      `<div style="font-size:11px;color:var(--g3);padding:5px 0;font-style:italic">Dateien hochladen in SharePoint → <code style="font-size:10px">0${theme.id}…/_AKTUALITAETEN/</code></div>`;
  }

  if (spArcWrap && spArchive.length) {
    const arcRows = spArchive.map(e => renderSpEntry(e)).filter(Boolean).join('');
    if (arcRows) spArcWrap.innerHTML =
      `<button class="akt-archive-toggle" onclick="toggleArchive('sp-${theme.id}')">▸ Archiv (${spArchive.length} ältere)</button>
       <div class="akt-archive" id="akt-archive-sp-${theme.id}">${arcRows}</div>`;
  }
}

function toggleArchive(key) {
  const arc = document.getElementById(`akt-archive-${key}`);
  if (!arc) return;
  arc.classList.toggle('open');
  const btn = arc.previousElementSibling;
  btn.textContent = arc.classList.contains('open')
    ? '▾ Archiv schliessen'
    : btn.textContent.replace('▾','▸');
}

// Nach renderAll() alle Aktualitäts-Zonen befüllen
// Wird auch bei Phase-Filter-Wechsel aufgerufen (re-render)
async function renderAllAkt() {
  const visible = THEMES.filter(t =>
    activeThema === 'ALL' || String(t.id) === activeThema
  );
  await Promise.all(visible.map(t => fillAktZone(t)));
}

renderAllAkt();
</script>
